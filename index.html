<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Button Archive Game</title>
  <link href="https://fonts.googleapis.com/css2?family=Jaro&display=swap" rel="stylesheet">
  <style>
    /* ══════════════════════════════════════════
       전역 리셋 & 기본 설정
       ══════════════════════════════════════════ */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #E8E8E8;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow-x: hidden;
    }

    /* 페이지 화면 공통 (피그마 고정 크기 1440x1024 반영) */
    .page {
      width: 1440px;
      height: 1024px;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }

    /* 화면 전환을 위한 숨김 처리 */
    .hidden {
      display: none !important;
    }

    /* ══════════════════════════════════════════
       [PAGE 1] 초기 와이어프레임 화면 CSS
       ══════════════════════════════════════════ */
    #start-page {
      background: #E8E8E8;
    }

    .bppc-text {
      position: absolute;
      width: 109px;
      height: 22px;
      left: 1289px;
      top: 965px;
      font-family: 'Jaro';
      font-style: normal;
      font-weight: 400;
      font-size: 27.3866px;
      line-height: 22px;
      text-align: center;
      color: #000000;
    }

    /* 메뉴 버튼 공통 스타일 */
    .menu-rect {
      position: absolute;
      width: 528px;
      height: 160px;
      left: 456px;
      background: #414141;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.1s, background-color 0.2s;
    }
    .menu-rect:hover { background: #333333; }
    .menu-rect:active { transform: scale(0.98); }

    #rect-358 { top: 416px; }
    #rect-359 { top: 600px; }
    #rect-360 { top: 784px; }

    .menu-text {
      font-family: 'Jaro';
      font-style: normal;
      font-weight: 400;
      font-size: 72px;
      line-height: 52px;
      text-align: center;
      letter-spacing: -0.02em;
      color: #F4F4F4;
      pointer-events: none;
    }

    /* 상단 로고 컨테이너 */
    .logo-container {
      position: absolute;
      width: 511px;
      height: 114px;
      left: calc(50% - 511px/2);
      top: 74px;
    }
    .logo-container svg {
      width: 100%;
      height: 100%;
    }

    /* 토글 사각형 공통 스타일 */
    .toggle-rect {
      box-sizing: border-box;
      position: absolute;
      width: 160px;
      height: 160px;
      top: 232px;
      background: #888888;
      border: 4px solid #000000;
      cursor: pointer;
      transition: background-color 0.15s, transform 0.1s;
    }
    .toggle-rect:active { transform: scale(0.95); }
    #rect-346-p1 { left: 456px; }
    #rect-347-p1 { left: 640px; }
    #rect-348-p1 { left: 824px; }


    /* ══════════════════════════════════════════
       [PAGE 2] 아카이브 화면 CSS
       ══════════════════════════════════════════ */
    #archive-page {
      background: #E8E8E8;
    }

    /* [수정] 꿈틀거림 방지를 위한 플렉스 그리드 정렬 */
    .timer-container {
      position: absolute;
      width: 600px; /* 고정 레이아웃 확보 */
      height: 114px;
      left: calc(50% - 600px/2);
      top: 65px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* [수정] 개별 단위 분할 및 가로폭 강제 지정을 통한 미동 방지 설정 */
    .timer-text-box {
      font-family: 'Jaro', sans-serif;
      font-size: 110px;
      font-weight: 400;
      color: #FE0154;
      line-height: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      user-select: none;
    }

    /* 숫자 블록(분, 초, 0.1초) 각각의 고정 폭 박스 */
    .timer-unit {
      width: 110px;        /* Jaro 폰트 110px 크기 기준 두 자리가 절대 안 흔들리는 크기 */
      text-align: center;
      display: inline-block;
    }

    /* 콜론 문자 전용 슬림 박스 */
    .timer-colon {
      width: 35px;
      text-align: center;
      display: inline-block;
    }

    /* 아카이브 버튼 스타일 */
    .archive-btn {
      position: absolute;
      width: 160px;
      height: 160px;
      background: #D9D9D9; 
      border: 4px solid #000000;
      cursor: pointer;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.1s;
      user-select: none;
    }
    .archive-btn:hover { transform: scale(1.04); }
    .archive-btn:active { transform: scale(0.96); }

    /* 버튼 배치 좌표값 */
    #rect-346 { left: 456px; top: 232px; }
    #rect-349 { left: 456px; top: 416px; }
    #rect-352 { left: 456px; top: 600px; }
    #rect-355 { left: 456px; top: 784px; }

    #rect-347 { left: 640px; top: 232px; }
    #rect-350 { left: 640px; top: 416px; }
    #rect-353 { left: 640px; top: 600px; }
    #rect-356 { left: 640px; top: 784px; }

    #rect-348 { left: 824px; top: 232px; }
    #rect-351 { left: 824px; top: 416px; }
    #rect-354 { left: 824px; top: 600px; }
    #rect-357 { left: 824px; top: 784px; }

    .btn-img {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .img-placeholder {
      font-size: 14px;
      font-family: monospace;
      color: #777777;
      font-weight: bold;
    }
    .btn-label {
      position: absolute;
      bottom: 6px;
      font-size: 10px;
      font-family: monospace;
      color: #333333;
      background: rgba(255, 255, 255, 0.8);
      padding: 1px 4px;
      border-radius: 3px;
      pointer-events: none;
    }

    #overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
      overflow: hidden;
    }
  </style>
</head>
<body>

      </svg>
    </div>

    <div class="toggle-rect" id="rect-346-p1"></div>
    <div class="toggle-rect" id="rect-347-p1"></div>
    <div class="toggle-rect" id="rect-348-p1"></div>

    <button class="menu-rect" id="rect-358">
      <span class="menu-text">PRESS TO START</span>
    </button>
    <button class="menu-rect" id="rect-359">
      <span class="menu-text">HOW TO PLAY?</span>
    </button>
    <button class="menu-rect" id="rect-360">
      <span class="menu-text">WHO ARE BPPC</span>
    </button>

    <div class="bppc-text">@BPPC.26</div>
  </div>


  <div class="page hidden" id="archive-page">
    <div class="timer-container">
      <div class="timer-text-box">
        <span class="timer-unit" id="t-min">00</span>
        <span class="timer-colon">:</span>
        <span class="timer-unit" id="t-sec">10</span>
        <span class="timer-colon">:</span>
        <span class="timer-unit" id="t-ds">00</span>
      </div>
    </div>
  </div>

  <div id="overlay"></div>


  <script>
  /* ════════════════════════════════════════════════
     1. 초기 화면 무한 무작위(Random) 색상 토글 로직
     ════════════════════════════════════════════════ */
  function getRandomColor() {
    const letters = '0123456789ABCDEF';
    let color = '#';
    for (let i = 0; i < 6; i++) {
      color += letters[Math.floor(Math.random() * 16)];
    }
    return color;
  }

  const toggleIds = ['rect-346-p1', 'rect-347-p1', 'rect-348-p1'];
  toggleIds.forEach(id => {
    const el = document.getElementById(id);
    if(el) {
      el.addEventListener('click', () => {
        el.style.backgroundColor = getRandomColor();
      });
    }
  });


  /* ════════════════════════════════════════════════
     2. [수정] 10초 무진동 분해형 카운트다운 시스템
     ════════════════════════════════════════════════ */
  let timerInterval = null;
  // [변경] 제한시간 10초 매핑 (10초 * 1000ms = 10,000ms)
  let remainingTime = 10 * 1000; 

  function startCountdown() {
    // 각각 분리 배치된 독립 구조 돔 객체 호출
    const minEl = document.getElementById('t-min');
    const secEl = document.getElementById('t-sec');
    const dsEl  = document.getElementById('t-ds');
    
    const updateRate = 100; // 0.1초 사이클 갱신 (100ms)

    if (timerInterval) clearInterval(timerInterval);

    timerInterval = setInterval(() => {
      remainingTime -= updateRate;

      if (remainingTime <= 0) {
        remainingTime = 0;
        clearInterval(timerInterval);
      }

      // 시간 변환 수식 계산
      const minutes = Math.floor(remainingTime / (60 * 1000));
      const seconds = Math.floor((remainingTime % (60 * 1000)) / 1000);
      const deciseconds = Math.floor((remainingTime % 1000) / 100);

      // 개별 영역에 패딩 문자 추가 후 별도로 데이터 주입 
      // 이 방식으로 인해 텍스트 레이아웃 전체가 절대 밀려나거나 움직이지 않습니다.
      minEl.textContent = String(minutes).padStart(2, '0');
      secEl.textContent = String(seconds).padStart(2, '0');
      dsEl.textContent  = String(deciseconds).padStart(2, '0');
    }, updateRate);
  }


  /* ════════════════════════════════════════════════
     3. 화면 전환 및 타이머 트리거
     ════════════════════════════════════════════════ */
  const startBtn = document.getElementById('rect-358');
  const startPage = document.getElementById('start-page');
  const archivePage = document.getElementById('archive-page');

  startBtn.addEventListener('click', () => {
    startPage.classList.add('hidden');
    archivePage.classList.remove('hidden');
    startCountdown();
  });


  /* ════════════════════════════════════════════════
     4. 버튼 데이터 세팅
     ════════════════════════════════════════════════ */
  const BUTTONS = [
    { id: 1,  rectId: 'rect-346', name: 'BTN-01', img: './images/bt1.png',  sound: './sounds/bts1.mp3' },
    { id: 2,  rectId: 'rect-347', name: 'BTN-02', img: './images/bt2.png',  sound: './sounds/bts2.mp3' },
    { id: 3,  rectId: 'rect-348', name: 'BTN-03', img: './images/bt3.png',  sound: './sounds/bts3.mp3' },
    { id: 4,  rectId: 'rect-349', name: 'BTN-04', img: './images/bt4.png',  sound: './sounds/bts4.mp3' },
    { id: 5,  rectId: 'rect-350', name: 'BTN-05', img: './images/bt5.png',  sound: './sounds/bts5.mp3' },
    { id: 6,  rectId: 'rect-351', name: 'BTN-06', img: './images/bt6.png',  sound: './sounds/bts6.mp3' },
    { id: 7,  rectId: 'rect-352', name: 'BTN-07', img: './images/bt7.png',  sound: './sounds/bts7.mp3' },
    { id: 8,  rectId: 'rect-353', name: 'BTN-08', img: './images/bt8.png',  sound: './sounds/bts8.mp3' },
    { id: 9,  rectId: 'rect-354', name: 'BTN-09', img: './images/bt9.png',  sound: './sounds/bts9.mp3' },
    { id: 10, rectId: 'rect-355', name: 'BTN-10', img: './images/bt10.png', sound: './sounds/bts10.mp3' },
    { id: 11, rectId: 'rect-356', name: 'BTN-11', img: './images/bt11.png', sound: './sounds/bts11.mp3' },
    { id: 12, rectId: 'rect-357', name: 'BTN-12', img: './images/bt12.png', sound: './sounds/bts12.mp3' }
  ];

  /* ════════════════════════════════════════════════
     5. 인터랙션 매핑 리스트
     ════════════════════════════════════════════════ */
  const INTERACTIONS = {
    1: () => spawnCircles(20, '#378ADD', 'fall'),
    2: () => spawnCircles(30, '#E24B4A', 'explode'),
    3: () => flyText('click!', '#534AB7', 18),
    4: () => spawnStars(25, '#639922'),
    5: () => scanLine('horizontal', '#1D9E75'),
    6: () => scanLine('vertical', '#D4537E'),
    7: () => letterRain('ABCDEFGHIJK', '#BA7517'),
    8: () => ripple('#EF9F27'),
    9: () => multiRipple('#185FA5', 5),
    10: () => pixelNoise(80),
    11: () => flashInvert(),
    12: () => crossLines('#E24B4A')
  };

  /* ════════════════════════════════════════════════
     6. 아카이브 좌표형 버튼 렌더링 및 이벤트 연결
     ════════════════════════════════════════════════ */
  const overlay = document.getElementById('overlay');

  BUTTONS.forEach(btn => {
    const btnEl = document.createElement('div');
    btnEl.className = 'archive-btn';
    btnEl.id = btn.rectId;

    const imgHTML = btn.img
      ? `<img src="${btn.img}" alt="${btn.name}" style="width:100%;height:100%;object-fit:cover;">`
      : `<div class="img-placeholder">D9D9D9</div>`;
      
    btnEl.innerHTML = `
      <div class="btn-img">${imgHTML}</div>
      <span class="btn-label">${btn.name}</span>
    `;

    btnEl.addEventListener('click', () => {
      if (btn.sound) {
        const audio = new Audio(btn.sound);
        audio.play().catch(err => {
          console.warn(`사운드 로드 실패: ${btn.sound}`, err);
        });
      }
      if (INTERACTIONS[btn.id]) INTERACTIONS[btn.id]();
    });

    archivePage.appendChild(btnEl);
  });

  /* ════════════════════════════════════════════════
     7. 시각 인터랙션 함수 세트 (1번~12번)
     ════════════════════════════════════════════════ */
  const vw   = () => window.innerWidth;
  const vh   = () => window.innerHeight;
  const rand = (a, b) => Math.random() * (b - a) + a;

  function spawnCircles(count, color, mode) {
    for (let i = 0; i < count; i++) {
      const el = document.createElement('div');
      const size = rand(10, 30);
      el.style.cssText = `position:fixed;width:${size}px;height:${size}px;border-radius:50%;background:${color};opacity:0.85;pointer-events:none;left:${rand(0,100)}vw;top:-${size}px;`;
      overlay.appendChild(el);
      const tx = mode === 'explode' ? rand(-200, 200) : rand(-40, 40);
      const ty = mode === 'explode' ? rand(-200, 200) : vh() + size + 20;
      el.animate([{ transform: 'translate(0,0)', opacity: 0.85 }, { transform: `translate(${tx}px, ${ty}px)`, opacity: 0 }], 
      { duration: rand(600, 1400), delay: rand(0, 400), easing: 'cubic-bezier(.2,.8,.4,1)', fill: 'forwards' }).onfinish = () => el.remove();
    }
  }

  function flyText(txt, color, size) {
    const el = document.createElement('div');
    el.textContent = txt;
    el.style.cssText = `position:fixed;font-size:${size||18}px;font-weight:500;color:${color};pointer-events:none;left:${rand(15,75)}vw;top:${rand(20,65)}vh;white-space:nowrap;z-index:10000;`;
    overlay.appendChild(el);
    el.animate([{ transform: 'translateY(0) scale(1)', opacity: 1 }, { transform: 'translateY(-80px) scale(1.4)', opacity: 0 }], { duration: 900, easing: 'ease-out', fill: 'forwards' }).onfinish = () => el.remove();
  }

  function spawnStars(count, color) {
    for (let i = 0; i < count; i++) {
      const el = document.createElement('div'); el.textContent = '★';
      el.style.cssText = `position:fixed;font-size:${rand(14,32)}px;color:${color};left:${rand(0,100)}vw;top:${rand(0,100)}vh;pointer-events:none;opacity:0.9;`;
      overlay.appendChild(el);
      el.animate([{ transform: `rotate(0deg) scale(0)`, opacity: 0.9 }, { transform: `rotate(${rand(-360,360)}deg) scale(1)`, opacity: 0, offset: 0.7 }, { opacity: 0 }], { duration: rand(800, 1600), delay: rand(0, 600), fill: 'forwards' }).onfinish = () => el.remove();
    }
  }

  function scanLine(dir, color) {
    const el = document.createElement('div'); const isH = dir === 'horizontal';
    el.style.cssText = `position:fixed;background:${color};opacity:0.6;pointer-events:none;${isH?`width:100vw;height:3px;top:0;left:0;`:`height:100vh;width:3px;top:0;left:0;`}`;
    overlay.appendChild(el);
    el.animate([{ transform: isH ? 'translateY(-3px)' : 'translateX(-3px)' }, { transform: isH ? `translateY(${vh()}px)` : `translateX(${vw()}px)` }], { duration: 600, easing: 'linear', fill: 'forwards' }).onfinish = () => el.remove();
  }

  function letterRain(chars, color) {
    for (let i = 0; i < 18; i++) {
      const el = document.createElement('div'); el.textContent = chars[Math.floor(rand(0, chars.length))];
      el.style.cssText = `position:fixed;font-family:monospace;font-size:${rand(12,28)}px;color:${color};left:${rand(0,100)}vw;top:-30px;pointer-events:none;`;
      overlay.appendChild(el);
      el.animate([{ transform: 'translateY(0)', opacity: 0.9 }, { transform: `translateY(${vh()+40}px)`, opacity: 0.1 }], { duration: rand(700, 1400), delay: rand(0, 500), easing: 'linear', fill: 'forwards' }).onfinish = () => el.remove();
    }
  }

  function ripple(color) {
    const el = document.createElement('div');
    el.style.cssText = `position:fixed;border:3px solid ${color};border-radius:50%;width:0;height:0;top:50%;left:50%;pointer-events:none;opacity:0.9;`;
    overlay.appendChild(el);
    el.animate([{ width: '0px', height: '0px', marginLeft: '0px', marginTop: '0px', opacity: 0.9 }, { width: '200vmax', height: '200vmax', marginLeft: '-100vmax', marginTop: '-100vmax', opacity: 0 }], { duration: 900, easing: 'ease-out', fill: 'forwards' }).onfinish = () => el.remove();
  }

  function multiRipple(color, n) { for (let i = 0; i < n; i++) { setTimeout(() => ripple(color), i * 160); } }

  function pixelNoise(count) {
    for (let i = 0; i < count; i++) {
      const el = document.createElement('div'); const s = rand(4, 16);
      el.style.cssText = `position:fixed;width:${s}px;height:${s}px;background:hsl(${rand(0,360)},70%,55%);left:${rand(0,100)}vw;top:${rand(0,100)}vh;pointer-events:none;`;
      overlay.appendChild(el);
      el.animate([{ opacity: rand(0.3, 1) }, { opacity: 0 }], { duration: rand(200, 600), delay: rand(0, 300), fill: 'forwards' }).onfinish = () => el.remove();
    }
  }

  function flashInvert() {
    const el = document.createElement('div'); el.style.cssText = `position:fixed;inset:0;mix-blend-mode:difference;background:white;pointer-events:none;`;
    overlay.appendChild(el);
    el.animate([{ opacity: 1 }, { opacity: 0 }], { duration: 300, fill: 'forwards' }).onfinish = () => el.remove();
  }

  function crossLines(color) {
    [45, -45].forEach(deg => {
      const el = document.createElement('div');
      el.style.cssText = `position:fixed;height:2px;background:${color};width:141vw;top:50%;left:50%;transform-origin:center;transform:translate(-50%,-50%) rotate(${deg}deg);pointer-events:none;opacity:0.9;`;
      overlay.appendChild(el);
      el.animate([{ scaleX: 0, opacity: 0.9 }, { scaleX: 1, opacity: 0, offset: 0.7 }, { opacity: 0 }], { duration: 700, easing: 'ease-in-out', fill: 'forwards' }).onfinish = () => el.remove();
    });
  }
  </script>
</body>
</html>
